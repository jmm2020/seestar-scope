version: "3.8"

services:
  seestar-scope:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seestar-scope
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=America/New_York
    volumes:
      - ./config.toml:/app/config.toml
      - ./captures:/app/captures
      - ./sessions:/app/sessions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
