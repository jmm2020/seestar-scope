# SeestarScope Configuration
title = "SeestarScope - Seestar S50 Control"

[seestar]
# Primary control path — ZWO firmware's native ASCOM Alpaca server.
# Confirmed working on firmware 7.34 / Alpaca v1.2.0-3 (2026-01-13).
# Park/Unpark/Slew/Tracking/Camera/Focuser/FilterWheel/Switch all native here.
ip_address = "192.168.0.132"
alpaca_port = 32323
auto_connect = true

# OPTIONAL — seestar_alp bridge. Only needed for features ZWO has not yet
# exposed via standard Alpaca: live view (MJPEG stream), stacking control,
# and raw JSON-RPC (get_device_state, get_view_state, iscope_start_*).
# Set alp_host to the host running the bridge (e.g. "192.168.0.234" for the
# Jetson) when those features are wanted; leave defaults otherwise.
alp_host = "localhost"
alp_port = 5555
img_port = 7556                   # MJPEG live view stream port (bridge)

[stellarium]
host = "localhost"
port = 8091

[ui]
port = 8502
theme = "dark"                     # dark or light
refresh_interval_seconds = 2       # dashboard auto-refresh rate

[imaging]
default_gain = 80
default_exposure_seconds = 10
save_directory = "./captures"      # where to save captured images
auto_save = false                  # auto-save after each capture

[catalog]
use_builtin = true                 # use built-in Messier/NGC catalog
use_stellarium_lookup = true       # also use Stellarium for object lookup

[site]
latitude = 37.12                   # degrees N (positive), S (negative)
longitude = -123.45                # degrees E (positive), W (negative)
elevation_m = 0                    # meters above sea level
name = "My Observatory"
