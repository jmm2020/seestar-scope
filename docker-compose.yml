services:
  seestar-alp:
    build:
      context: vendor/seestar_alp
      dockerfile: docker/Dockerfile
    container_name: seestar-alp
    restart: unless-stopped
    networks:
      - seestar-net
    ports:
      - "5555:5555"
      # MJPEG live-view stream — the imaging page builds an <img src=...:7556/0/vid>
      # URL that the browser fetches directly, so the port must be published.
      # Browser → http://<jetson-ip>:7556/0/vid → seestar_alp MJPEG endpoint.
      # Note: for Cloudflare-tunnel access (s50.jmm2020ai.com), the stream needs
      # to be proxied through the Streamlit/backend container — Cloudflare only
      # proxies the tunnel's HTTPS port, not arbitrary container ports.
      - "7556:7556"
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - captures-data:/home/seestar/seestar_alp/captures
      - sessions-data:/home/seestar/seestar_alp/sessions
      # Override vendored config so ALP binds 0.0.0.0 (reachable from
      # other compose services) instead of the upstream default 127.0.0.1.
      - ./alp-config/config.toml:/home/seestar/seestar_alp/device/config.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/management/apiversions"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  seestar-portal-backend:
    build:
      context: portal
      dockerfile: backend/Dockerfile
    container_name: seestar-portal-backend
    restart: unless-stopped
    networks:
      - seestar-net
    ports:
      - "8503:8503"
    environment:
      - TZ=${TZ:-America/New_York}
      - "SEESTAR_IP=${SEESTAR_IP:?Set SEESTAR_IP in .env - station 192.168.0.132 or AP-mode 192.168.4.1}"
      - "SEESTAR_PORT=${SEESTAR_PORT:?Set SEESTAR_PORT in .env - ALPACA port is 32323 for all modes}"
      - ALP_HOST=seestar-alp
      - ALP_PORT=5555
      - DATA_DIR=/app/data
    volumes:
      - captures-data:/app/captures
      - gallery-db:/app/data
    depends_on:
      seestar-alp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8503/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  seestar-portal-ui:
    build:
      context: portal
      dockerfile: Dockerfile
    container_name: seestar-portal-ui
    restart: unless-stopped
    networks:
      - seestar-net
    ports:
      - "8502:8502"
    environment:
      - TZ=${TZ:-America/New_York}
      - BACKEND_URL=${BACKEND_URL:-http://seestar-portal-backend:8503}
      - ALP_HOST=seestar-alp
      - ALP_PORT=5555
    volumes:
      - sessions-data:/app/sessions
    depends_on:
      seestar-portal-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  seestar-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: seestar-cloudflared
    restart: unless-stopped
    # File-based config: shares the workstation's existing tunnel (831e21c1...).
    # Mount credentials JSON + config.yml from ./cloudflared (gitignored creds).
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      seestar-portal-ui:
        condition: service_healthy
    networks:
      - seestar-net
    profiles:
      - tunnel

networks:
  seestar-net:
    driver: bridge

volumes:
  captures-data:
  sessions-data:
  gallery-db:
