name: seestar-feature-walkthrough
description: |
  Use when: User wants an end-to-end probe of every Seestar Scope feature to find
  what works vs what's broken vs what's stubbed.
  Triggers: "feature walkthrough", "probe seestar", "test all features",
            "feature audit", "walkthrough report", "exercise features".
  Does: Probes ALP devices + backend routes + each Streamlit view + Stellarium
        + raw S50 hardware in parallel, then synthesizes a JSON + markdown
        report. Optionally posts the markdown as a GitHub comment.
  NOT for: Modifying source code, capturing telescope frames, or fixing
           anything. Read-only — probe and report only.

interactive: false

# Read-only probe — runs against the live source. No worktree mutation.
worktree:
  enabled: false

nodes:
  # ---------------------------------------------------------------------------
  # Phase 0 — ground the run in current API/library docs. Parallel root, runs
  # alongside Phase 1 probes. Downstream AI nodes read $ARTIFACTS_DIR/current-docs.json
  # to anchor reasoning in real current API surfaces, not training-data echo.
  #
  # This is the canonical "fetch-current-docs" template node — auto-detects the
  # stack from project manifests and pulls canonical docs for each detected dep.
  # ---------------------------------------------------------------------------
  - id: web-research
    model: sonnet
    allowed_tools: [Read, Bash, WebSearch, WebFetch, Write, Glob]
    prompt: |
      You are grounding this workflow in *current* documentation so downstream
      probes and synthesis don't rely on stale training-data assumptions.

      ## Step 1 — detect the stack
      Read whichever of these exist and extract dependency names:
      - `portal/requirements.txt`, `portal/backend/requirements.txt`
      - `pyproject.toml`
      - `package.json` (frontend, if any)
      - `docker-compose*.yml` (service images)

      For seestar-scope specifically expect at minimum:
      - FastAPI (backend), Streamlit (views), Pillow, requests
      - seestar_alp (the ALPACA bridge to S50 hardware) — external project at
        https://github.com/smart-underworld/seestar_alp
      - ASCOM Alpaca API (the protocol seestar_alp speaks)
      - Optional: Stellarium remote control API

      ## Step 2 — fetch canonical docs
      For each detected dependency, do at most ONE WebSearch to find the
      current canonical docs URL (prefer official docs over tutorials), then
      ONE WebFetch on the page that captures the API surface a probe needs:
      endpoints, method signatures, breaking changes since 2024.

      Caps: 8 deps total, 8 WebFetches max. Skip stdlib. Skip if a topic is
      already covered by a related package.

      For seestar_alp + ASCOM Alpaca, prioritize:
      - The Alpaca Device API spec (which endpoints exist per device type)
      - seestar_alp's README/docs for its specific extensions

      ## Step 3 — write the grounding artifact
      Write `$ARTIFACTS_DIR/current-docs.json`:
      ```json
      {
        "fetched_at": "<iso8601>",
        "stack_detected": ["fastapi", "streamlit", "seestar_alp", "..."],
        "references": [
          {
            "name": "fastapi",
            "version_in_project": "0.115.x",
            "docs_url": "https://fastapi.tiangolo.com/...",
            "key_facts": [
              "Routers register via app.include_router(router, prefix=...)",
              "..."
            ]
          }
        ],
        "notes": "Free-form caveats — e.g. 'Alpaca spec v3 has breaking changes vs v2'"
      }
      ```

      End your response with one line: "<N> deps detected, <M> docs fetched".
    denied_tools: [Edit]
    # Anchor to a trivial bash node so Archon's scheduler picks this up.
    # Root-level AI nodes (no depends_on) were silently skipped in earlier runs.
    # probe-stack-health finishes in ~80ms, so parallelism intent is preserved.
    depends_on: [probe-stack-health]
    trigger_rule: all_done
    timeout: 240000

  # ---------------------------------------------------------------------------
  # Phase 0b — grounding artifacts: run context (git SHA + env) and project
  # config extraction (alp-config/config.toml). Both are tiny bash nodes so
  # downstream probes can self-parameterize instead of hardcoding values.
  # ---------------------------------------------------------------------------
  - id: record-run-context
    bash: |
      set +e
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/run-context.json"
      trap '[ -s "$OUT" ] || echo "{\"status\":\"error\",\"reason\":\"node crashed before writing\"}" > "$OUT"' EXIT

      SHA=$(git -c safe.directory=* rev-parse HEAD 2>/dev/null || echo "unknown")
      BRANCH=$(git -c safe.directory=* rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
      DIRTY=$(git -c safe.directory=* status --porcelain 2>/dev/null | wc -l | tr -d ' ')
      SHORT=$(git -c safe.directory=* rev-parse --short HEAD 2>/dev/null || echo "unknown")
      cat > "$OUT" <<EOF
      {
        "started_at": "$(date -Iseconds)",
        "git_sha": "$SHA",
        "git_short_sha": "$SHORT",
        "git_branch": "$BRANCH",
        "git_dirty_files": $DIRTY,
        "jetson_host": "${JETSON_HOST:-192.168.0.234}",
        "seestar_ip": "${SEESTAR_IP:-192.168.0.132}",
        "seestar_port": "${SEESTAR_PORT:-32323}",
        "post_gh_comment": "${POST_GH_COMMENT:-0}",
        "gh_issue_number": "${GH_ISSUE_NUMBER:-}"
      }
      EOF
      cat "$OUT"
      exit 0
    timeout: 5000

  - id: read-project-config
    bash: |
      set +e
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/project-config.json"
      trap '[ -s "$OUT" ] || echo "{\"status\":\"error\",\"reason\":\"node crashed before writing\"}" > "$OUT"' EXIT

      CONFIG_PATHS=("alp-config/config.toml" "vendor/seestar_alp/device/config.toml")
      FOUND=""
      for p in "${CONFIG_PATHS[@]}"; do
        if [ -f "$p" ]; then FOUND="$p"; break; fi
      done

      if [ -z "$FOUND" ]; then
        echo '{"found": false, "alp_port": 5555, "seestars": [], "primary_device_num": 0}' > "$OUT"
        cat "$OUT"; exit 0
      fi

      python3 - "$FOUND" > "$OUT" <<'PY'
      import sys, json, re
      path = sys.argv[1]
      text = open(path).read()
      def grep_int(pat, default):
          m = re.search(pat, text, re.M)
          return int(m.group(1)) if m else default
      seestars = []
      for block in re.findall(r"\[\[seestars\]\][^\[]*", text):
          name_m = re.search(r'name\s*=\s*"([^"]+)"', block)
          ip_m = re.search(r'ip_address\s*=\s*"([^"]+)"', block)
          num_m = re.search(r'device_num\s*=\s*(\d+)', block)
          if name_m or ip_m or num_m:
              seestars.append({
                  "name": name_m.group(1) if name_m else None,
                  "ip_address": ip_m.group(1) if ip_m else None,
                  "device_num": int(num_m.group(1)) if num_m else None,
              })
      out = {
          "found": True,
          "config_path": path,
          "alp_port": grep_int(r'^port\s*=\s*(\d+)', 5555),
          "seestars": seestars,
          "primary_device_num": seestars[0]["device_num"] if seestars and seestars[0].get("device_num") is not None else 0,
      }
      print(json.dumps(out, indent=2))
      PY
      cat "$OUT"
      exit 0
    timeout: 5000

  # ---------------------------------------------------------------------------
  # Phase 1 — soft stack-health probe + hardware presence detect (parallel).
  # NOTE: We do not boot the stack here — the Archon worker container has no
  # docker socket and is not on seestar-net. We probe what we can reach
  # (host-published ports + LAN) and report.
  # ---------------------------------------------------------------------------
  - id: probe-stack-health
    bash: |
      set +e
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/stack-health.json"
      trap '[ -s "$OUT" ] || echo "{\"status\":\"error\",\"reason\":\"node crashed before writing\"}" > "$OUT"' EXIT

      probe_one() {
        local svc="$1"
        shift
        for url in "$@"; do
          if curl -fsS -m 4 "$url" > /dev/null 2>&1; then
            printf '{"service":"%s","reachable":true,"url":"%s"}' "$svc" "$url"
            return 0
          fi
        done
        printf '{"service":"%s","reachable":false,"tried":%s}' \
          "$svc" "$(printf '%s\n' "$@" | python3 -c 'import json,sys; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))')"
      }

      JETSON_HOST="${JETSON_HOST:-192.168.0.234}"
      echo "[" > "$OUT"
      probe_one seestar-alp "http://${JETSON_HOST}:5555/management/apiversions" "http://localhost:5555/management/apiversions" >> "$OUT"
      echo "," >> "$OUT"
      probe_one seestar-portal-backend "http://${JETSON_HOST}:8503/health" "http://localhost:8503/health" >> "$OUT"
      echo "," >> "$OUT"
      probe_one seestar-portal-ui "http://${JETSON_HOST}:8502/_stcore/health" "http://localhost:8502/_stcore/health" >> "$OUT"
      echo "" >> "$OUT"
      echo "]" >> "$OUT"
      cat "$OUT"
      exit 0
    timeout: 30000

  - id: detect-hardware
    bash: |
      set +e
      IP="${SEESTAR_IP:-192.168.0.132}"
      PORT="${SEESTAR_PORT:-32323}"
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/hardware.json"
      trap '[ -s "$OUT" ] || echo "{\"status\":\"error\",\"reason\":\"node crashed before writing\"}" > "$OUT"' EXIT
      echo "Probing $IP:$PORT (2s timeout)..."
      if timeout 2 bash -c "</dev/tcp/$IP/$PORT" 2>/dev/null; then
        echo "{\"hw_available\": true, \"address\": \"$IP:$PORT\"}" > "$OUT"
        echo "HW_AVAILABLE=true (S50 reachable at $IP:$PORT)"
      else
        echo "{\"hw_available\": false, \"address\": \"$IP:$PORT\"}" > "$OUT"
        echo "HW_AVAILABLE=false (S50 not reachable at $IP:$PORT)"
      fi
      exit 0
    timeout: 5000

  # ---------------------------------------------------------------------------
  # Phase 2 — parallel probes. All depend on probe-stack-health for ordering,
  # but use trigger_rule: all_done so they run regardless of stack-probe result.
  # ---------------------------------------------------------------------------
  - id: probe-alp-devices
    bash: |
      set +e
      JETSON_HOST="${JETSON_HOST:-192.168.0.234}"
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/alp-devices.json"
      trap '[ -s "$OUT" ] || echo "{\"status\":\"error\",\"reason\":\"node crashed before writing\"}" > "$OUT"' EXIT

      # Read primary device_num from project-config artifact (default 0 if missing)
      DEVICE_NUM=$(python3 -c "import json; print(json.load(open('$ARTIFACTS_DIR/project-config.json')).get('primary_device_num', 0))" 2>/dev/null || echo 0)

      # Try host-published port first, then container DNS (works only if Archon
      # worker is co-resident on seestar-net — usually false but cheap to try).
      ALP_BASE=""
      for base in "http://${JETSON_HOST}:5555" "http://seestar-alp:5555" "http://localhost:5555"; do
        if curl -fsS -m 4 "${base}/management/apiversions" > /dev/null 2>&1; then
          ALP_BASE="$base"
          break
        fi
      done

      echo "[" > "$OUT"
      first=1
      for dev in telescope camera focuser filterwheel switch; do
        REACHABLE=false; CONNECTED=null; NAME=""; ERR=""
        if [ -n "$ALP_BASE" ]; then
          if RESP=$(curl -fsS -m 5 "${ALP_BASE}/api/v1/${dev}/${DEVICE_NUM}/connected" 2>&1); then
            REACHABLE=true
            CONNECTED=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('Value','null'))" 2>/dev/null || echo null)
            NAME=$(curl -fsS -m 5 "${ALP_BASE}/api/v1/${dev}/${DEVICE_NUM}/name" 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('Value',''))" 2>/dev/null || echo "")
          else
            ERR=$(echo "$RESP" | head -c 200 | tr '"' "'")
          fi
        else
          ERR="ALP base URL unreachable from worker"
        fi
        [ "$first" -eq 0 ] && echo "," >> "$OUT"
        first=0
        printf '  {"device":"%s","device_num":%s,"reachable":%s,"connected":%s,"name":"%s","error":"%s","alp_base":"%s"}' \
          "$dev" "$DEVICE_NUM" "$REACHABLE" "$CONNECTED" "$NAME" "$ERR" "$ALP_BASE" >> "$OUT"
      done
      echo "" >> "$OUT"
      echo "]" >> "$OUT"
      cat "$OUT"
      exit 0
    depends_on: [probe-stack-health, read-project-config]
    trigger_rule: all_done
    timeout: 60000

  - id: probe-backend-routes
    bash: |
      set +e
      JETSON_HOST="${JETSON_HOST:-192.168.0.234}"
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/backend-routes.json"

      BACKEND_BASE=""
      for base in "http://${JETSON_HOST}:8503" "http://seestar-portal-backend:8503" "http://localhost:8503"; do
        if curl -fsS -m 4 "${base}/health" > /dev/null 2>&1; then
          BACKEND_BASE="$base"
          break
        fi
      done

      if [ -z "$BACKEND_BASE" ]; then
        echo '{"reachable":false,"error":"backend not reachable from worker on any tried base","routes":[]}' > "$OUT"
        cat "$OUT"
        exit 0
      fi

      OPEN=$(curl -fsS -m 5 "${BACKEND_BASE}/openapi.json" 2>/dev/null || echo "")
      if [ -z "$OPEN" ]; then
        echo "{\"reachable\":true,\"backend_base\":\"$BACKEND_BASE\",\"error\":\"openapi not reachable\",\"routes\":[]}" > "$OUT"
        cat "$OUT"
        exit 0
      fi

      cat > /tmp/probe-routes.py << 'PY'
      import json, sys, urllib.request, time, os
      spec = json.load(sys.stdin)
      backend = os.environ.get('BACKEND_BASE','')
      results = []
      for path, methods in (spec.get('paths') or {}).items():
          if any(seg in path for seg in ('{', 'admin', 'shutdown')):
              continue
          if 'get' not in methods:
              continue
          url = backend.rstrip('/') + path
          t0 = time.time()
          try:
              req = urllib.request.Request(url, headers={'Accept':'application/json'})
              with urllib.request.urlopen(req, timeout=5) as r:
                  results.append({'path': path, 'status': r.status, 'ms': int((time.time()-t0)*1000), 'error': ''})
          except Exception as e:
              results.append({'path': path, 'status': 0, 'ms': int((time.time()-t0)*1000), 'error': str(e)[:200]})
      json.dump({'reachable': True, 'backend_base': backend, 'routes': results}, sys.stdout, indent=2)
      PY
      BACKEND_BASE="$BACKEND_BASE" echo "$OPEN" | BACKEND_BASE="$BACKEND_BASE" python3 /tmp/probe-routes.py > "$OUT"
      cat "$OUT"
      exit 0
    depends_on: [probe-stack-health]
    trigger_rule: all_done
    timeout: 120000

  - id: probe-each-view
    model: sonnet
    allowed_tools: [Read, Bash, Glob, Write]
    prompt: |
      You are exercising every Streamlit view in `portal/views/*.py` to determine
      whether each is WORKING, STUBBED, BROKEN, or HARDWARE_REQUIRED.

      ## Inputs (artifacts from earlier nodes)
      - `$ARTIFACTS_DIR/current-docs.json` — current canonical API references for
        each detected dep (FastAPI, Streamlit, seestar_alp, Alpaca spec, …).
        Use this to anchor your reasoning in real current API surfaces.
      - `$ARTIFACTS_DIR/stack-health.json` — which of the 3 services is reachable
      - `$ARTIFACTS_DIR/hardware.json` — `{hw_available: true|false, address: "..."}`
      - `$ARTIFACTS_DIR/alp-devices.json` — per-device reachability + connection
      - `$ARTIFACTS_DIR/backend-routes.json` — which FastAPI routes responded

      Read those FIRST. They tell you what infrastructure is up and what
      the current API contracts look like.

      ## Bases (use these in your curl probes)
      - JETSON_HOST: `${JETSON_HOST:-192.168.0.234}`
      - Backend: try `http://${JETSON_HOST}:8503` then `http://localhost:8503`
      - ALP: try `http://${JETSON_HOST}:5555` then `http://localhost:5555`
      - Raw S50 ALPACA: `http://${SEESTAR_IP:-192.168.0.132}:32323`

      ## What to do for each view file
      1. Read the source of `portal/views/<view>.py`.
      2. Identify the HTTP/ALPACA endpoints it calls.
      3. For each non-hardware-only call, exercise it via `curl` against the
         appropriate base. Use the artifact JSON to pick a base that's known up.
      4. If a call requires real telescope state and `hw_available=false`,
         classify the affected feature as `HARDWARE_REQUIRED` (not BROKEN).
      5. If the view is mostly placeholder (`st.info("coming soon")`-style),
         mark `STUBBED`.

      ## Status rubric
      - `WORKING` — the view's endpoints respond 2xx with sensible bodies.
      - `STUBBED` — view code is mostly placeholder; few/no real calls.
      - `BROKEN` — view's endpoints exist but return 4xx/5xx, time out, or the
        view's imports / required services are down.
      - `HARDWARE_REQUIRED` — feature depends on the live S50 and HW is absent.

      ## Output
      Write to `$ARTIFACTS_DIR/views.json`:
      ```json
      {
        "views": [
          {
            "view": "dashboard",
            "status": "WORKING",
            "evidence": "GET /api/v1/telescope/0/connected → 200",
            "calls_probed": ["GET /api/v1/telescope/0/connected"]
          }
        ]
      }
      ```
      Cover all 11 views: dashboard, live_status, skymap, goto, imaging, focus,
      autofocus, platesolve, sequence, gallery, settings. (theme.py is pure CSS;
      skip or mark WORKING if it imports cleanly.)

      End your response with a one-line confirmation that the JSON is written.
    denied_tools: [Edit]
    depends_on: [web-research, probe-stack-health, detect-hardware, probe-alp-devices, probe-backend-routes]
    trigger_rule: all_done

  - id: probe-stellarium
    bash: |
      set +e
      HOST="${STELLARIUM_HOST:-localhost}"
      PORT="${STELLARIUM_PORT:-8091}"
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/stellarium.json"
      if curl -fsS -m 3 "http://$HOST:$PORT/api/main/status" > "$OUT" 2>/dev/null; then
        echo "Stellarium OK at $HOST:$PORT"
      else
        echo "{\"reachable\": false, \"host\":\"$HOST\",\"port\":$PORT}" > "$OUT"
        echo "Stellarium not reachable at $HOST:$PORT — soft fail (optional dep)"
      fi
      exit 0
    depends_on: [probe-stack-health]
    trigger_rule: all_done
    timeout: 5000

  # ---------------------------------------------------------------------------
  # Phase 3 — synthesize. Runs even if probes had failures (all_done).
  # ---------------------------------------------------------------------------
  - id: synthesize-report
    model: sonnet
    allowed_tools: [Read, Write, Bash]
    prompt: |
      You are synthesizing the Seestar Scope feature walkthrough report.

      ## Source artifacts (read all that exist; missing = probe failed, note it)
      - `$ARTIFACTS_DIR/stack-health.json`
      - `$ARTIFACTS_DIR/hardware.json`
      - `$ARTIFACTS_DIR/alp-devices.json`
      - `$ARTIFACTS_DIR/backend-routes.json`
      - `$ARTIFACTS_DIR/views.json`
      - `$ARTIFACTS_DIR/stellarium.json`

      ## Output 1: structured JSON
      Write `$ARTIFACTS_DIR/feature-walkthrough.json`:
      ```json
      {
        "run_at": "<iso8601>",
        "hardware_available": true,
        "stack_health": {"seestar-alp": true, "seestar-portal-backend": false, ...},
        "features": [
          {
            "feature": "GoTo view",
            "category": "view",
            "status": "BROKEN",
            "evidence": "POST /api/v1/telescope/0/slewtocoordinates → 500",
            "suggested_issue_title": "GoTo view: slew API returns 500 against live S50"
          }
        ],
        "summary_counts": {"WORKING":N, "STUBBED":N, "BROKEN":N, "HARDWARE_REQUIRED":N},
        "root_causes": [
          {"description": "seestar-alp container not running", "affected_features": [...]}
        ]
      }
      ```

      ## Output 2: markdown summary
      Write `$ARTIFACTS_DIR/feature-walkthrough.md`:
      - H1: `# Seestar Feature Walkthrough — <date>`
      - One-line summary counts.
      - Root cause section (group features by shared cause).
      - A table sorted by severity (BROKEN first, then HARDWARE_REQUIRED, STUBBED, WORKING):

        | Feature | Status | Evidence | Suggested Issue Title |

      End your response by printing the markdown table inline so it's visible
      in the chat transcript even if the artifact files are lost.
    denied_tools: [Edit]
    depends_on: [probe-alp-devices, probe-backend-routes, probe-each-view, probe-stellarium]
    trigger_rule: all_done

  # ---------------------------------------------------------------------------
  # Phase 4 — GitHub posting. Defaults: post on (POST_GH_COMMENT=1).
  # Caller decides the target each dispatch:
  #   GH_ISSUE_NUMBER=<n> → comment on that issue
  #   GH_ISSUE_NUMBER unset or empty → create a new dated issue
  #   POST_GH_COMMENT=0 → skip posting entirely
  # ---------------------------------------------------------------------------
  - id: post-summary
    bash: |
      set +e
      MD_FILE="$ARTIFACTS_DIR/feature-walkthrough.md"
      POST="${POST_GH_COMMENT:-1}"
      ISSUE="${GH_ISSUE_NUMBER:-}"

      if [ "$POST" != "1" ]; then
        echo "POST_GH_COMMENT=$POST — explicitly disabled, skipping post-summary"
        exit 0
      fi

      if [ ! -f "$MD_FILE" ]; then
        echo "ERROR: $MD_FILE not found — synthesize-report must have failed"
        exit 1
      fi

      if [ -n "$ISSUE" ]; then
        echo "Commenting on issue #$ISSUE..."
        gh issue comment "$ISSUE" --repo jmm2020/seestar-scope --body-file "$MD_FILE" || exit $?
      else
        echo "Creating new dated issue..."
        gh issue create --repo jmm2020/seestar-scope \
          --title "Feature walkthrough — $(date -I)" \
          --body-file "$MD_FILE" || exit $?
      fi
    depends_on: [synthesize-report]
    trigger_rule: all_done
    timeout: 30000
