name: seestar-feature-walkthrough
description: |
  Use when: User wants an end-to-end probe of every Seestar Scope feature to find
  what works vs what's broken vs what's stubbed.
  Triggers: "feature walkthrough", "probe seestar", "test all features",
            "feature audit", "walkthrough report", "exercise features".
  Does: Boots the docker stack, probes ALP devices + backend routes + each
        Streamlit view + Stellarium in parallel, then synthesizes a JSON +
        markdown report. Optionally posts the markdown as a GitHub comment.
  NOT for: Modifying source code, capturing telescope frames, or fixing
           anything. Read-only — probe and report only.

interactive: false

# Read-only probe — runs against the live source. No worktree required;
# its absence keeps state in artifacts/<run> only.
worktree:
  enabled: false

nodes:
  # ---------------------------------------------------------------------------
  # Phase 1 — parallel roots: boot the stack and detect hardware presence.
  # ---------------------------------------------------------------------------
  - id: boot-stack
    bash: |
      set -e
      echo "=== boot-stack ==="
      cd "$BASE_DIR" 2>/dev/null || cd .
      docker compose up -d
      DEADLINE=$(( $(date +%s) + 60 ))
      check_one() {
        local svc="$1" probe="$2"
        until curl -fsS "$probe" > /dev/null 2>&1; do
          if [ "$(date +%s)" -gt "$DEADLINE" ]; then
            echo "FAIL: $svc not healthy at $probe within 60s"
            docker compose ps
            exit 1
          fi
          sleep 2
        done
        echo "OK: $svc healthy at $probe"
      }
      check_one seestar-alp           "http://localhost:5555/management/apiversions" 2>&1 || \
        check_one seestar-alp         "http://seestar-alp:5555/management/apiversions"
      check_one seestar-portal-backend "http://localhost:8503/health" 2>&1 || \
        check_one seestar-portal-backend "http://seestar-portal-backend:8503/health"
      check_one seestar-portal-ui     "http://localhost:8502/_stcore/health" 2>&1 || \
        check_one seestar-portal-ui   "http://seestar-portal-ui:8502/_stcore/health"
      echo "=== boot-stack: all healthy ==="
    timeout: 90000

  - id: detect-hardware
    bash: |
      set -e
      IP="${SEESTAR_IP:-192.168.0.132}"
      PORT="${SEESTAR_PORT:-32323}"
      echo "Probing $IP:$PORT (2s timeout)..."
      if timeout 2 bash -c "</dev/tcp/$IP/$PORT" 2>/dev/null; then
        echo "HW_AVAILABLE=true"
        echo "REACHED $IP:$PORT"
      else
        echo "HW_AVAILABLE=false"
        echo "Hardware not reachable at $IP:$PORT — hardware-only probes will skip"
      fi
    timeout: 5000

  # ---------------------------------------------------------------------------
  # Phase 2 — parallel probes (depend on boot-stack; detect-hardware advisory).
  # ---------------------------------------------------------------------------
  - id: probe-alp-devices
    bash: |
      set -e
      ALP="${ALP_BASE:-http://localhost:5555}"
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/alp-devices.json"
      echo "[" > "$OUT"
      first=1
      for dev in telescope camera focuser filterwheel switch; do
        REACHABLE=false; CONNECTED=null; NAME=""; ERR=""
        if RESP=$(curl -fsS -m 5 "$ALP/api/v1/$dev/0/connected" 2>&1); then
          REACHABLE=true
          CONNECTED=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('Value','null'))" 2>/dev/null || echo null)
          NAME=$(curl -fsS -m 5 "$ALP/api/v1/$dev/0/name" 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('Value',''))" 2>/dev/null || echo "")
        else
          ERR=$(echo "$RESP" | head -c 200 | tr '"' "'" )
        fi
        [ "$first" -eq 0 ] && echo "," >> "$OUT"
        first=0
        printf '  {"device":"%s","reachable":%s,"connected":%s,"name":"%s","error":"%s"}' \
          "$dev" "$REACHABLE" "$CONNECTED" "$NAME" "$ERR" >> "$OUT"
      done
      echo "" >> "$OUT"
      echo "]" >> "$OUT"
      cat "$OUT"
    depends_on: [boot-stack]
    timeout: 60000

  - id: probe-backend-routes
    bash: |
      set -e
      BACKEND="${BACKEND_BASE:-http://localhost:8503}"
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/backend-routes.json"
      OPEN=$(curl -fsS -m 5 "$BACKEND/openapi.json" 2>/dev/null || echo "")
      if [ -z "$OPEN" ]; then
        echo '{"error":"openapi not reachable","routes":[]}' > "$OUT"
        cat "$OUT"
        exit 0
      fi
      cat > /tmp/probe-routes.py << 'PY'
      import json, sys, urllib.request, time, os
      spec = json.load(sys.stdin)
      backend = os.environ.get('BACKEND_BASE','http://localhost:8503')
      results = []
      for path, methods in (spec.get('paths') or {}).items():
          if any(seg in path for seg in ('{', 'admin', 'shutdown')):
              continue
          if 'get' not in methods:
              continue
          url = backend.rstrip('/') + path
          t0 = time.time()
          try:
              req = urllib.request.Request(url, headers={'Accept':'application/json'})
              with urllib.request.urlopen(req, timeout=5) as r:
                  results.append({'path': path, 'status': r.status, 'ms': int((time.time()-t0)*1000), 'error': ''})
          except Exception as e:
              results.append({'path': path, 'status': 0, 'ms': int((time.time()-t0)*1000), 'error': str(e)[:200]})
      json.dump({'routes': results}, sys.stdout, indent=2)
      PY
      echo "$OPEN" | python3 /tmp/probe-routes.py > "$OUT"
      cat "$OUT"
    depends_on: [boot-stack]
    timeout: 120000

  - id: probe-each-view
    model: sonnet
    allowed_tools: [Read, Bash, Glob]
    prompt: |
      You are exercising every Streamlit view in `portal/views/*.py` to determine
      whether each view is WORKING, STUBBED, BROKEN, or HARDWARE_REQUIRED.

      ## Inputs
      - `boot-stack` is OK (services are healthy).
      - `detect-hardware` output: `$detect-hardware.output` — look for `HW_AVAILABLE=true|false`.
      - ALP base: `${ALP_BASE:-http://localhost:5555}`
      - Backend base: `${BACKEND_BASE:-http://localhost:8503}`

      ## What to do for each view file
      1. Read the source of `portal/views/<view>.py`.
      2. Identify the HTTP/ALPACA endpoints it calls (look for `requests.`, `httpx.`,
         `alpaca.`, `backend.`, hard-coded URLs).
      3. For non-hardware-only endpoints, exercise them via `curl` against ALP /
         backend bases above.
      4. If a call requires real telescope data and `HW_AVAILABLE=false`, classify
         as `HARDWARE_REQUIRED` (not BROKEN).
      5. If the view is mostly placeholder or `st.info("coming soon")`-style, mark
         as `STUBBED`.

      ## Status rubric
      - `WORKING` — view's endpoints respond 2xx with sensible bodies.
      - `STUBBED` — view code is mostly placeholder; few/no real calls.
      - `BROKEN` — view's endpoints exist but return 4xx/5xx, time out, or the
        view imports fail.
      - `HARDWARE_REQUIRED` — view depends on the live S50; can't be assessed.

      ## Output
      Write to `$ARTIFACTS_DIR/views.json` a JSON object exactly like:
      ```
      {
        "views": [
          {
            "view": "dashboard",
            "status": "WORKING",
            "evidence": "GET /api/v1/telescope/0/connected → 200",
            "calls_probed": ["GET /api/v1/telescope/0/connected"]
          }
        ]
      }
      ```
      Cover all 11 views: dashboard, live_status, skymap, goto, imaging, focus,
      autofocus, platesolve, sequence, gallery, settings, theme. (Theme is
      pure CSS; mark it WORKING if it imports cleanly.)

      End your response with the path to the JSON file you wrote.
    denied_tools: [Edit, Write]
    depends_on: [boot-stack]

  - id: probe-stellarium
    bash: |
      HOST="${STELLARIUM_HOST:-localhost}"
      PORT="${STELLARIUM_PORT:-8091}"
      mkdir -p "$ARTIFACTS_DIR"
      if curl -fsS -m 3 "http://$HOST:$PORT/api/main/status" > "$ARTIFACTS_DIR/stellarium.json" 2>/dev/null; then
        echo "Stellarium OK at $HOST:$PORT"
      else
        echo '{"reachable": false, "host":"'"$HOST"'","port":'"$PORT"'}' > "$ARTIFACTS_DIR/stellarium.json"
        echo "Stellarium not reachable at $HOST:$PORT — soft fail (optional dep)"
      fi
    depends_on: [boot-stack]
    timeout: 5000

  # ---------------------------------------------------------------------------
  # Phase 3 — synthesize. Runs even if individual probes failed (all_done).
  # ---------------------------------------------------------------------------
  - id: synthesize-report
    model: sonnet
    allowed_tools: [Read, Write, Bash]
    prompt: |
      You are synthesizing the Seestar Scope feature walkthrough report.

      ## Source artifacts
      - `$ARTIFACTS_DIR/alp-devices.json` (from probe-alp-devices)
      - `$ARTIFACTS_DIR/backend-routes.json` (from probe-backend-routes)
      - `$ARTIFACTS_DIR/views.json` (from probe-each-view)
      - `$ARTIFACTS_DIR/stellarium.json` (from probe-stellarium)
      - Hardware availability: `$detect-hardware.output`

      Some artifacts may be missing (probe failures) — handle gracefully.

      ## Output 1: structured JSON
      Write `$ARTIFACTS_DIR/feature-walkthrough.json` shaped:
      ```json
      {
        "run_at": "<iso8601>",
        "hardware_available": true,
        "features": [
          {
            "feature": "GoTo view",
            "category": "view",
            "status": "BROKEN",
            "evidence": "POST /api/v1/telescope/0/slewtocoordinates → 500",
            "suggested_issue_title": "GoTo view: slew API returns 500 against live S50"
          }
        ],
        "summary_counts": {"WORKING":N, "STUBBED":N, "BROKEN":N, "HARDWARE_REQUIRED":N}
      }
      ```

      ## Output 2: markdown summary
      Write `$ARTIFACTS_DIR/feature-walkthrough.md` with:
      - H1: `# Seestar Feature Walkthrough — <date>`
      - One-line summary counts.
      - A table sorted by severity (BROKEN first, then HARDWARE_REQUIRED, STUBBED, WORKING):

        | Feature | Status | Evidence | Suggested Issue Title |

      End your response by printing the markdown table inline (so it's visible in chat).
    denied_tools: [Edit]
    depends_on: [probe-alp-devices, probe-backend-routes, probe-each-view, probe-stellarium]
    trigger_rule: all_done

  # ---------------------------------------------------------------------------
  # Phase 4 — optional GitHub posting (gated on POST_GH_COMMENT=1).
  # ---------------------------------------------------------------------------
  - id: check-post-flag
    bash: |
      if [ "${POST_GH_COMMENT:-0}" = "1" ]; then
        echo "POST_GH_COMMENT=1 — proceeding to post-summary"
        exit 0
      else
        echo "POST_GH_COMMENT not set — skipping post-summary"
        exit 1
      fi
    depends_on: [synthesize-report]
    trigger_rule: all_success

  - id: post-summary
    model: haiku
    allowed_tools: [Read, Bash]
    prompt: |
      Post the feature-walkthrough markdown report to GitHub.

      Read: `$ARTIFACTS_DIR/feature-walkthrough.md`

      Two modes (decide from env):
      - If `GH_ISSUE_NUMBER` is set, comment on that issue:
          `gh issue comment $GH_ISSUE_NUMBER --repo jmm2020/seestar-scope --body-file $ARTIFACTS_DIR/feature-walkthrough.md`
      - Otherwise, open a new issue:
          `gh issue create --repo jmm2020/seestar-scope \
             --title "Feature walkthrough — $(date -I)" \
             --body-file $ARTIFACTS_DIR/feature-walkthrough.md`

      Print the resulting URL.
    denied_tools: [Edit, Write]
    depends_on: [check-post-flag]
    trigger_rule: all_success
